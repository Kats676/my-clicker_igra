<!DOCTYPE html>
<html>
<head>
<meta charset=utf-8>
<meta name=viewport 
content=`width=device-width,initial-scale=1`>
<title>GD Mega Edition</title>
<link rel=stylesheet href=style.css>
</head>
<body>

<div id=gameContainer>

  <!-- Меню смерти и прогресса -->
  <div id=M1 class=m>
    <h2 id=W_TXT>БАБАХ!</h2>
    <p id=MODE_TXT>Режим: КУБИК</p>
    <p id=LVL_TXT>УРОВЕНЬ: 1</p>
    <div id=BAR><div id=FILL></div></div>
    <p id=SCORE_TXT>Счет: 0</p>
    <button onclick=restartGame()>
      ИГРАТЬ ЗАНОВО
    </button>
    <button onclick=revivePlayer()>
      ВОЗРОДИТЬСЯ (1 🔑)
    </button>
    <button class=d onclick=openDonateMenu()>
      VIP-ПАК: 100 КЛЮЧЕЙ + БЕЗ РЕКЛАМЫ (150р)
    </button>
  </div>

  <!-- Меню доната за 100р -->
  <div id=M2 class=m>
    <h2>ДОНАТ-ЦЕНТР</h2>
    <p>100 Ключей + Отключение рекламы = 150 Рублей</p>
    <button class=d onclick=paySystem(1)>
      Карта МИР / СБП
    </button>
    <button onclick=paySystem(2) 
            style=background:#229ed9>
      TG Stars ⭐️
    </button>
    <button onclick=closeDonateMenu() 
            style=background:#444>
      НАЗАД
    </button>
  </div>

  <canvas id=G></canvas>
</div>

<script src=game.js></script>
</body>
</html>
