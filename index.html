<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KVANT — Общение будущего</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-tertiary: #1a1a2e;
      --accent: #7c3aed;
      --accent-glow: #a78bfa;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --danger: #ef4444;
      --success: #22c55e;
      --border: #1e293b;
      --glass: rgba(18, 18, 26, 0.8);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      background-image: 
        radial-gradient(ellipse at 20% 50%, rgba(124, 58, 237, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(167, 139, 250, 0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(124, 58, 237, 0.06) 0%, transparent 50%);
    }

    /* Анимированный фон с частицами */
    .particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      background: var(--accent);
      border-radius: 50%;
      animation: float 6s infinite;
      opacity: 0.3;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.3; }
      50% { transform: translateY(-100px) scale(1.5); opacity: 0.6; }
    }

    /* Экран входа */
    .login-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
      background: var(--bg-primary);
      transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .login-screen.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(1.1);
    }

    .login-box {
      background: var(--glass);
      backdrop-filter: blur(40px);
      border: 1px solid var(--border);
      padding: 50px 40px;
      border-radius: 24px;
      text-align: center;
      box-shadow: 
        0 0 60px rgba(124, 58, 237, 0.15),
        0 20px 60px rgba(0, 0, 0, 0.5);
      animation: slideUp 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-logo {
      font-size: 48px;
      margin-bottom: 10px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    .login-box h1 {
      font-size: 42px;
      font-weight: 900;
      background: linear-gradient(135deg, #7c3aed, #a78bfa, #c4b5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
      letter-spacing: -1px;
    }

    .login-box p {
      color: var(--text-secondary);
      margin-bottom: 30px;
      font-weight: 400;
    }

    .input-group {
      position: relative;
      margin: 15px 0;
    }

    .input-group input {
      width: 320px;
      padding: 16px 20px;
      background: var(--bg-tertiary);
      border: 2px solid var(--border);
      border-radius: 16px;
      color: var(--text-primary);
      font-size: 15px;
      font-weight: 500;
      transition: all 0.3s ease;
      outline: none;
      font-family: 'Inter', sans-serif;
    }

    .input-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(124, 58, 237, 0.2);
      background: #1e1e32;
    }

    .input-group input::placeholder {
      color: #64748b;
      font-weight: 400;
    }

    .btn-primary {
      width: 100%;
      padding: 16px;
      margin-top: 10px;
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
      font-family: 'Inter', sans-serif;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(124, 58, 237, 0.4);
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    /* Основной интерфейс */
    .app-container {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .main-window {
      width: 1100px;
      max-width: 95vw;
      height: 700px;
      max-height: 90vh;
      background: var(--glass);
      backdrop-filter: blur(30px);
      border: 1px solid var(--border);
      border-radius: 24px;
      display: flex;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 60px rgba(124, 58, 237, 0.1);
      animation: windowAppear 0.5s ease;
    }

    @keyframes windowAppear {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    /* Боковая панель с участниками */
    .sidebar {
      width: 260px;
      background: rgba(10, 10, 15, 0.6);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 24px 20px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h2 {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #c4b5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .online-count {
      background: rgba(124, 58, 237, 0.2);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 13px;
      color: var(--accent-glow);
      font-weight: 600;
    }

    .users-list {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }

    .users-list::-webkit-scrollbar {
      width: 4px;
    }

    .users-list::-webkit-scrollbar-thumb {
      background: var(--accent);
      border-radius: 10px;
    }

    .user-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 15px;
      margin: 5px 0;
      border-radius: 12px;
      transition: all 0.3s ease;
      animation: userJoin 0.5s ease;
    }

    @keyframes userJoin {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .user-item:hover {
      background: rgba(124, 58, 237, 0.1);
    }

    .user-avatar {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      color: white;
    }

    .user-info {
      flex: 1;
    }

    .user-name {
      font-weight: 600;
      font-size: 14px;
    }

    .user-status {
      font-size: 11px;
      color: var(--success);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background: var(--success);
      border-radius: 50%;
      animation: glow 2s infinite;
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
      50% { box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
    }

    /* Область чата */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      padding: 24px 30px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .room-badge {
      background: rgba(124, 58, 237, 0.15);
      color: var(--accent-glow);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 30px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .messages-container::-webkit-scrollbar {
      width: 6px;
    }

    .messages-container::-webkit-scrollbar-thumb {
      background: var(--accent);
      border-radius: 10px;
    }

    .message-wrapper {
      display: flex;
      gap: 12px;
      animation: msgSlide 0.3s ease;
      align-items: flex-start;
    }

    @keyframes msgSlide {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-avatar {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: linear-gradient(135deg, #a78bfa, #c4b5fd);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 13px;
      color: white;
      flex-shrink: 0;
    }

    .message-content {
      flex: 1;
    }

    .message-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }

    .message-nickname {
      font-weight: 700;
      font-size: 14px;
      color: #a78bfa;
    }

    .message-time {
      font-size: 11px;
      color: #64748b;
    }

    .message-bubble {
      background: var(--bg-tertiary);
      padding: 12px 18px;
      border-radius: 0 16px 16px 16px;
      color: var(--text-primary);
      font-size: 14px;
      line-height: 1.5;
      display: inline-block;
      border: 1px solid var(--border);
    }

    /* Системное сообщение */
    .system-message {
      text-align: center;
      padding: 8px;
      color: #64748b;
      font-size: 12px;
      font-weight: 500;
      animation: msgSlide 0.3s ease;
    }

    /* Поле ввода */
    .input-area {
      padding: 20px 30px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .input-area input {
      flex: 1;
      padding: 14px 20px;
      background: var(--bg-tertiary);
      border: 2px solid var(--border);
      border-radius: 14px;
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 500;
      outline: none;
      transition: all 0.3s ease;
      font-family: 'Inter', sans-serif;
    }

    .input-area input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(124, 58, 237, 0.15);
    }

    .send-btn {
      padding: 14px 24px;
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      border: none;
      border-radius: 14px;
      color: white;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .send-btn:hover {
      box-shadow: 0 8px 25px rgba(124, 58, 237, 0.5);
      transform: translateY(-1px);
    }

    .hidden {
      display: none !important;
    }

    /* Мобильная адаптация */
    @media (max-width: 768px) {
      .main-window {
        flex-direction: column;
        height: 100vh;
        border-radius: 0;
      }
      .sidebar {
        width: 100%;
        height: auto;
        flex-direction: row;
        overflow-x: auto;
      }
      .input-group input {
        width: 250px;
      }
    }
  </style>
</head>
<body>

<!-- Частицы фона -->
<div class="particles" id="particles"></div>

<!-- Экран входа -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">⚡</div>
    <h1>KVANT</h1>
    <p>Общение на скорости света</p>
    <div class="input-group">
      <input type="text" id="nicknameInput" placeholder="Твой никнейм" maxlength="15" autocomplete="off">
    </div>
    <div class="input-group">
      <input type="text" id="roomInput" placeholder="Название комнаты" maxlength="20" autocomplete="off">
    </div>
    <button class="btn-primary" onclick="joinRoom()">🚀 Присоединиться</button>
  </div>
</div>

<!-- Основное приложение -->
<div class="app-container hidden" id="appContainer">
  <div class="main-window">
    
    <!-- Сайдбар с участниками -->
    <div class="sidebar">
      <div class="sidebar-header">
        <h2>👥 Участники <span class="online-count" id="onlineCount">0</span></h2>
      </div>
      <div class="users-list" id="usersList"></div>
    </div>

    <!-- Чат -->
    <div class="chat-area">
      <div class="chat-header">
        <span>💬</span>
        <span class="room-badge" id="roomBadge">#комната</span>
      </div>
      <div class="messages-container" id="messagesContainer">
        <div class="system-message">Добро пожаловать в KVANT ✨</div>
      </div>
      <div class="input-area">
        <input type="text" id="messageInput" placeholder="Напиши сообщение..." onkeypress="if(event.key==='Enter') sendMessage()" autocomplete="off">
        <button class="send-btn" onclick="sendMessage()">📤 Отправить</button>
      </div>
    </div>

  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  // Создание частиц
  (function createParticles() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.width = Math.random() * 4 + 'px';
      particle.style.height = particle.style.width;
      particle.style.left = Math.random() * 100 + '%';
      particle.style.top = Math.random() * 100 + '%';
      particle.style.animationDelay = Math.random() * 6 + 's';
      particle.style.animationDuration = (Math.random() * 6 + 4) + 's';
      container.appendChild(particle);
    }
  })();

  let socket;
  let currentRoom;
  let myNickname;

  function joinRoom() {
    const nickname = document.getElementById('nicknameInput').value.trim();
    const room = document.getElementById('roomInput').value.trim();

    if (!nickname || !room) {
      // Эффект тряски при ошибке
      const loginBox = document.querySelector('.login-box');
      loginBox.style.animation = 'none';
      loginBox.offsetHeight;
      loginBox.style.animation = 'shake 0.5s ease';
      return;
    }

    myNickname = nickname;
    currentRoom = room;
    socket = io();
    
    socket.emit('join-room', room, nickname);

    // Плавный переход
    const loginScreen = document.getElementById('loginScreen');
    loginScreen.classList.add('hidden');
    
    setTimeout(() => {
      document.getElementById('appContainer').classList.remove('hidden');
      document.getElementById('roomBadge').textContent = '#' + room;
    }, 400);

    // Получение сообщений
    socket.on('chat-message', (data) => {
      const container = document.getElementById('messagesContainer');
      
      if (data.nickname === '⚙️ Система') {
        const div = document.createElement('div');
        div.className = 'system-message';
        div.textContent = data.message;
        container.appendChild(div);
      } else {
        const wrapper = document.createElement('div');
        wrapper.className = 'message-wrapper';
        wrapper.innerHTML = `
          <div class="message-avatar">${data.nickname[0].toUpperCase()}</div>
          <div class="message-content">
            <div class="message-header">
              <span class="message-nickname">${data.nickname}</span>
              <span class="message-time">${data.time}</span>
            </div>
            <div class="message-bubble">${data.message}</div>
          </div>
        `;
        container.appendChild(wrapper);
      }
      
      container.scrollTop = container.scrollHeight;
    });

    // Обновление списка участников
    socket.on('update-users', (users) => {
      document.getElementById('onlineCount').textContent = users.length;
      const list = document.getElementById('usersList');
      list.innerHTML = users.map(u => `
        <div class="user-item">
          <div class="user-avatar">${u.nickname[0].toUpperCase()}</div>
          <div class="user-info">
            <div class="user-name">${u.nickname}</div>
            <div class="user-status"><span class="status-dot"></span> онлайн</div>
          </div>
        </div>
      `).join('');
    });
  }

  function sendMessage() {
    const input = document.getElementById('messageInput');
    const message = input.value.trim();
    if (!message || !socket) return;
    
    socket.emit('send-message', message);
    input.value = '';
    input.focus();
  }

  // Анимация тряски
  const style = document.createElement('style');
  style.textContent = `
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }
  `;
  document.head.appendChild(style);
</script>
</body>
</html>
